<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>豆包文生图</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%); margin: 0; padding: 24px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 32px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        textarea, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 16px; border: 1px solid #ccc; }
        button { background: #3b82f6; color: white; font-weight: bold; cursor: pointer; }
        .result { margin-top: 24px; text-align: center; }
        img { max-width: 100%; border-radius: 24px; }
        .loading { display: none; text-align: center; color: #3b82f6; }
        .error { color: red; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>✨ 豆包 · 文生图</h2>
        <textarea id="prompt" rows="3" placeholder="描述你想要生成的画面，例如：千军万马，硝烟弥漫，史诗级电影质感">千军万马</textarea>
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
            <input type="number" id="width" placeholder="宽度" value="1328">
            <input type="number" id="height" placeholder="高度" value="1328">
            <input type="number" id="scale" placeholder="引导强度" value="2.5" step="0.5">
            <input type="number" id="seed" placeholder="随机种子" value="-1">
        </div>
        <label><input type="checkbox" id="addLogo"> 添加水印</label>
        <input type="text" id="logoText" placeholder="水印文字" value="豆包试用">
        <button id="generate">🚀 生成图片</button>
        <div id="loading" class="loading">🎨 AI 正在创作中，请稍候...</div>
        <div id="result" class="result"></div>
    </div>
</div>
<script>
    document.getElementById('generate').onclick = async () => {
        const prompt = document.getElementById('prompt').value.trim();
        if (!prompt) return alert('请输入描述');
        const payload = {
            prompt,
            width: parseInt(document.getElementById('width').value),
            height: parseInt(document.getElementById('height').value),
            scale: parseFloat(document.getElementById('scale').value),
            seed: parseInt(document.getElementById('seed').value),
            add_logo: document.getElementById('addLogo').checked,
            logo_text: document.getElementById('logoText').value,
        };
        document.getElementById('result').innerHTML = '';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('generate').disabled = true;
        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (res.ok && data.image_url) {
                document.getElementById('result').innerHTML = `<img src="${data.image_url}" alt="生成的图片">`;
            } else {
                document.getElementById('result').innerHTML = `<div class="error">❌ 失败：${data.error || '未知错误'}</div>`;
            }
        } catch (err) {
            document.getElementById('result').innerHTML = `<div class="error">❌ 网络错误：${err.message}</div>`;
        } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('generate').disabled = false;
        }
    };
</script>
</body>
</html>
